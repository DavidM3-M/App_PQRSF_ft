
  <!DOCTYPE html>
  <html lang="es" translate="no">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <meta name="google" content="notranslate" />
      <!-- Cabeceras de seguridad HTTP via meta tags -->
      <meta http-equiv="X-Content-Type-Options" content="nosniff" />
      <meta http-equiv="X-Frame-Options" content="DENY" />
      <meta name="referrer" content="strict-origin-when-cross-origin" />
      <!--
        Content Security Policy:
        - script-src: solo propio + Google Identity Services (login con Google)
        - style-src:  propio + inline (necesario para Tailwind/MUI en runtime)
        - connect-src: propio + backend configurable por VITE_API_URL
        - frame-src:  Google para el popup de OAuth
        NOTA: ajustar connect-src con la URL real del backend en producción.
      -->
      <meta http-equiv="Content-Security-Policy"
        content="default-src 'self';
          script-src 'self' 'unsafe-inline' https://accounts.google.com;
          style-src 'self' 'unsafe-inline';
          img-src 'self' data: https:;
          connect-src 'self' http://localhost:8000 https://accounts.google.com;
          frame-src https://accounts.google.com;
          font-src 'self' data:;
          object-src 'none';
          base-uri 'self';" />
      <title>Sistema PQRS Institucional</title>
    </head>

    <body>
      <div id="root"></div>
      <script type="module" src="/src/main.tsx"></script>
    </body>
  </html>
